<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel | CamEvent Explorer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="admin">
  <div id="loading-screen"><div class="loader"></div></div>
  <div class="mobile-menu" id="mobileMenu">
    <button id="mobileClose" class="mobile-toggle">✕</button>
    <a href="index.html">Home</a>
    <a href="events.html">Events</a>
    <a href="attractions.html">Attractions</a>
    <a href="login.html">Login</a>
    <a href="signup.html">Sign Up</a>
  </div>
  <header class="site-header">
    <a class="brand" href="index.html"><span>CamEvent</span> Explorer</a>
    <nav class="main-nav">
      <a class="nav-link" href="index.html">Home</a>
      <a class="nav-link" href="events.html">Events</a>
      <a class="nav-link" href="attractions.html">Attractions</a>
      <a class="nav-link" href="dashboard.html">Dashboard</a>
    </nav>
    <div class="nav-actions">
      <button id="darkToggle" class="dark-toggle"><span>Dark</span></button>
      <button class="mobile-toggle">☰</button>
    </div>
  </header>

  <main class="page-shell">
    <section class="section" data-reveal>
      <div class="section-title"><h2>Admin panel</h2><p>Manage users, events and reports with professional dashboard visuals.</p></div>
      <div id="adminTotals" class="cards-grid"></div>
    </section>

    <section class="section" data-reveal>
      <div class="section-title"><h2>Users</h2></div>
      <div class="table-card"><table class="table"><thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th></tr></thead><tbody id="adminUsers"></tbody></table></div>
    </section>

    <section class="section" data-reveal>
      <div class="section-title"><h2>Events</h2></div>
      <div class="table-card"><table class="table"><thead><tr><th>ID</th><th>Title</th><th>Location</th><th>Category</th></tr></thead><tbody id="adminEvents"></tbody></table></div>
    </section>

    <section class="section" data-reveal>
      <div class="section-title"><h2>Reports</h2></div>
      <div class="table-card"><table class="table"><thead><tr><th>ID</th><th>User</th><th>Issue</th><th>Status</th></tr></thead><tbody id="adminReports"></tbody></table></div>
    </section>
  </main>

  <a class="fab" href="dashboard.html">🛠️</a>
  <button id="backTop" class="back-top" aria-label="Back to top">↑</button>
  <script src="script.js"></script>
</body>
</html>
