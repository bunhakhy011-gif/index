<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | EventHub Explorer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="signup">
  <div id="loading-screen"><div class="loader"></div></div>
  <div class="mobile-menu" id="mobileMenu">
    <button id="mobileClose" class="mobile-toggle">✕</button>
    <a href="index.html">Home</a>
    <a href="events.html">Events</a>
    <a href="attractions.html">Attractions</a>
    <a href="login.html">Login</a>
    <a href="signup.html">Sign Up</a>
  </div>
  <header class="site-header">
    <a class="brand" href="index.html"><span>EventHub</span> Explorer</a>
    <nav class="main-nav">
      <a class="nav-link" href="index.html">Home</a>
      <a class="nav-link" href="events.html">Events</a>
      <a class="nav-link" href="attractions.html">Attractions</a>
      <a class="nav-link" href="dashboard.html">Dashboard</a>
    </nav>
    <div class="nav-actions">
      <button id="darkToggle" class="dark-toggle"><span>Dark</span></button>
      <button class="mobile-toggle">☰</button>
    </div>
  </header>

  <main class="page-shell">
    <section class="section" data-reveal>
      <div class="section-title"><h2>Create your account</h2><p>Join the platform and start saving events, attractions and booking mock tickets.</p></div>
      <div class="form-card glass-card">
        <form id="signupForm">
          <div class="input-grid inline"><div class="input-group"><label>Full Name</label><input id="signupName" type="text" required /></div><div class="input-group"><label>Email</label><input id="signupEmail" type="email" required /></div></div>
          <div class="input-grid inline"><div class="input-group"><label>Password</label><input id="signupPassword" type="password" required /></div><div class="input-group"><label>Confirm Password</label><input id="signupConfirm" type="password" required /></div></div>
          <button class="btn btn-primary full-width">Create Account</button>
        </form>
      </div>
    </section>
  </main>

  <a class="fab" href="login.html">✅</a>
  <button id="backTop" class="back-top" aria-label="Back to top">↑</button>
  <script src="script.js"></script>
</body>
</html>
