<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Organizer Dashboard | EventHub Explorer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="organizer">
  <div id="loading-screen"><div class="loader"></div></div>
  <div class="mobile-menu" id="mobileMenu">
    <button id="mobileClose" class="mobile-toggle">✕</button>
    <a href="index.html">Home</a>
    <a href="events.html">Events</a>
    <a href="attractions.html">Attractions</a>
    <a href="login.html">Login</a>
    <a href="signup.html">Sign Up</a>
  </div>
  <header class="site-header">
    <a class="brand" href="index.html"><span>EventHub</span> Explorer</a>
    <nav class="main-nav">
      <a class="nav-link" href="index.html">Home</a>
      <a class="nav-link" href="events.html">Events</a>
      <a class="nav-link" href="attractions.html">Attractions</a>
      <a class="nav-link" href="dashboard.html">Dashboard</a>
    </nav>
    <div class="nav-actions">
      <button id="darkToggle" class="dark-toggle"><span>Dark</span></button>
      <button class="mobile-toggle">☰</button>
    </div>
  </header>

  <main class="page-shell">
    <section class="section" data-reveal>
      <div class="section-title"><h2>Organizer dashboard</h2><p>Manage your events and review analytics with a clean organizer interface.</p></div>
      <div id="organizerAnalytics" class="cards-grid"></div>
    </section>

    <section class="section" data-reveal>
      <div class="section-split">
        <div class="form-card">
          <h3>Create event</h3>
          <form id="organizerForm">
            <div class="input-group"><label>Event Name</label><input id="eventName" type="text" required /></div>
            <div class="input-grid inline"><div class="input-group"><label>Date</label><input id="eventDate" type="date" required /></div><div class="input-group"><label>Location</label><input id="eventLocation" type="text" required /></div></div>
            <div class="input-group"><label>Category</label><select id="eventCategory"><option>Festival</option><option>Concert</option><option>Food Fair</option><option>Startup Event</option><option>Cultural Event</option><option>Sports</option></select></div>
            <div class="input-group"><label>Upload Image</label><input type="file" accept="image/*" /></div>
            <button class="btn btn-primary full-width">Create Event</button>
          </form>
        </div>
        <aside class="detail-card"><h3>Current events</h3><div id="organizerEvents" class="related-list"></div></aside>
      </div>
    </section>
  </main>

  <a class="fab" href="dashboard.html">📊</a>
  <button id="backTop" class="back-top" aria-label="Back to top">↑</button>
  <script src="script.js"></script>
</body>
</html>
